<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #f9f9f9; /* Light background color for the table */
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #4CAF50; /* Green background for the header */
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2; /* Light gray color for even rows */
        }

        tr:nth-child(odd) {
            background-color: #ffffff; /* White color for odd rows */
        }

        tr.completed td {
            text-decoration: line-through;
            color: gray;
        }

        button {
            padding: 5px 10px;
            margin: 2px;
            background-color: #007BFF; /* Blue background for buttons */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3; /* Darker blue when hovered */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My To-Do List</h1>
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="What needs to be done?" required>
            <button type="submit">Add</button>
        </form>
        <div class="filters">
            <button class="filter active" data-filter="all">All</button>
            <button class="filter" data-filter="active">Active</button>
            <button class="filter" data-filter="completed">Completed</button>
        </div>
        <ul id="todo-list">
            <!-- Tasks will be added here -->
        </ul>
        <div class="stats">
            <span id="items-left">0 items left</span>
            <button id="clear-completed">Clear</button>
        </div>
    </div>

    <script>
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const itemsLeft = document.getElementById('items-left');
        const clearCompletedButton = document.getElementById('clear-completed');
        const filters = document.querySelectorAll('.filter');

        let todos = []; // Store todos in an array

        // Function to update the list
        function updateTodoList() {
            todoList.innerHTML = '';
            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.classList.toggle('completed', todo.completed);
                li.innerHTML = `
                    <span class="todo-text">${todo.text}</span>
                    <button class="toggle-complete" onclick="toggleComplete(${index})">✔</button>
                    <button class="delete" onclick="deleteTask(${index})">✘</button>
                `;
                todoList.appendChild(li);
            });
            itemsLeft.textContent = `${todos.filter(todo => !todo.completed).length} items left`;
        }

        // Add a new task
        todoForm.addEventListener('submit', function (event) {
            event.preventDefault();
            const newTodo = {
                text: todoInput.value,
                completed: false,
            };
            todos.push(newTodo);
            todoInput.value = '';
            updateTodoList();
        });

        // Toggle task completion
        function toggleComplete(index) {
            todos[index].completed = !todos[index].completed;
            updateTodoList();
        }

        // Delete task
        function deleteTask(index) {
            todos.splice(index, 1);
            updateTodoList();
        }

        // Clear all tasks
        clearCompletedButton.addEventListener('click', function () {
            todos = []; // Clear the entire todo list
            updateTodoList();
        });

        // Filter tasks
        filters.forEach(filter => {
            filter.addEventListener('click', function () {
                filters.forEach(f => f.classList.remove('active'));
                filter.classList.add('active');
                
                const filterType = filter.getAttribute('data-filter');
                if (filterType === 'all') {
                    updateTodoList();
                } else if (filterType === 'active') {
                    updateTodoList();
                    todos = todos.filter(todo => !todo.completed);
                } else if (filterType === 'completed') {
                    updateTodoList();
                    todos = todos.filter(todo => todo.completed);
                }
            });
        });
    </script>
</body>
</html>
